name: Replit Keep-Alive Pinger

on:
  schedule:
    - cron: "*/5 * * * *" # Runs every 5 minutes
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Replit to keep bot alive
        run: |
          echo "🏓 Pinging Replit bot..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%%{http_code}" --max-time 30 https://jobscrap--akshat3478.replit.app/ 2>/dev/null)
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Bot is alive!"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ Bot may be down (all pings failed)"
